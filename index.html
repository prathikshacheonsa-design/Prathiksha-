<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prathiksha ✦ Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&family=Dancing+Script:wght@500;700&display=swap" rel="stylesheet"/>
  <style>
    /* ── LIGHT MODE ── */
    :root, [data-theme="light"] {
      --lavender: #c9a8e0;
      --soft-purple: #b896d6;
      --deep-purple: #9a72c4;
      --gold: #f0c878;
      --bg: #fbf3e3;
      --bg2: #f7ecd4;
      --white: #fffaf0;
      --text: #5c4470;
      --muted: #a888c0;
      --card-bg: #fffaf0;
      --nav-bg: rgba(251,243,227,0.88);
      --nav-border: rgba(184,150,214,0.25);
      --stat-bg: linear-gradient(135deg, rgba(201,168,224,0.28), rgba(251,243,227,0.6));
      --stat-border: rgba(184,150,214,0.35);
      --skill-track: rgba(184,150,214,0.2);
      --divider-color: var(--soft-purple);
    }
    /* ── DARK MODE ── */
    [data-theme="dark"] {
      --lavender: #a87fcf;
      --soft-purple: #b08fd0;
      --deep-purple: #d4b3f0;
      --gold: #e8be7a;
      --bg: #1d1726;
      --bg2: #251d30;
      --white: #2a2233;
      --text: #ecdff7;
      --muted: #b08fd0;
      --card-bg: #2c2436;
      --nav-bg: rgba(29,23,38,0.92);
      --nav-border: rgba(176,143,208,0.2);
      --stat-bg: linear-gradient(135deg, rgba(60,45,80,0.7), rgba(36,29,48,0.8));
      --stat-border: rgba(176,143,208,0.25);
      --skill-track: rgba(176,143,208,0.15);
      --divider-color: var(--soft-purple);
    }


    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Quicksand', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      transition: background 0.5s, color 0.5s;
    }

    /* ── THEME TOGGLE ── */
    .theme-toggle {
      position: fixed;
      top: 18px;
      right: 20px;
      z-index: 200;
      background: var(--card-bg);
      border: 2px solid var(--soft-purple);
      border-radius: 100px;
      padding: 8px 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      font-size: 0.82rem;
      color: var(--deep-purple);
      box-shadow: 0 4px 20px rgba(139,114,190,0.2);
      transition: all 0.3s;
    }
    .theme-toggle:hover { transform: scale(1.05); box-shadow: 0 6px 28px rgba(154,114,196,0.35); }
    .toggle-track {
      width: 36px; height: 20px;
      background: var(--soft-purple);
      border-radius: 100px;
      position: relative;
      transition: background 0.3s;
    }
    .toggle-thumb {
      position: absolute;
      top: 3px; left: 3px;
      width: 14px; height: 14px;
      background: #fff;
      border-radius: 50%;
      transition: left 0.3s;
    }
    [data-theme="dark"] .toggle-thumb { left: 19px; }
    [data-theme="dark"] .toggle-track { background: var(--deep-purple); }

    /* ── FLOATING PARTICLES ── */
    #particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .particle { position: absolute; border-radius: 50%; animation: floatUp linear infinite; opacity: 0; }
    @keyframes floatUp {
      0%   { transform: translateY(100vh) scale(0.5); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.4; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* ── NAVBAR ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 48px;
      background: var(--nav-bg);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--nav-border);
      transition: background 0.5s;
    }
    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem; color: var(--deep-purple);
      display: flex; align-items: center; gap: 10px;
    }
    /* Note: profile.jpg must be in same folder as index.html */
    .nav-logo-img {
      width: 36px; height: 36px; border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--soft-purple);
    }
    .nav-links { display: flex; gap: 32px; list-style: none; }
    .nav-links a {
      text-decoration: none; color: var(--muted); font-weight: 600;
      font-size: 0.88rem; letter-spacing: 0.04em; text-transform: uppercase;
      transition: color 0.3s;
    }
    .nav-links a:hover { color: var(--deep-purple); }

    /* ── HERO ── */
    #hero {
      position: relative; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; text-align: center;
      overflow: hidden; z-index: 1; padding-top: 80px;
    }
    .tulip-bg { position: absolute; inset: 0; z-index: -1; overflow: hidden; }
    .heart-wrap {
      position: absolute;
      animation: sway 5s ease-in-out infinite;
      transform-origin: center center;
    }
    .heart-wrap:nth-child(even) { animation-direction: reverse; }
    .butterfly-wrap {
      position: absolute;
      animation: flutter 4s ease-in-out infinite;
      transform-origin: center center;
    }
    .butterfly-wrap:nth-child(odd) { animation-duration: 4.6s; }
    @keyframes flutter {
      0%,100% { transform: translateY(0) rotate(-4deg); }
      50%      { transform: translateY(-16px) rotate(4deg); }
    }
    @keyframes sway {
      0%,100% { rotate: -3deg; }
      50%      { rotate: 3deg; }
    }

    /* ── HERO PHOTO ── */
    .hero-photo-wrap {
      margin-bottom: 20px;
      animation: bunnybounce 3s ease-in-out infinite;
    }
    .hero-photo {
      width: 180px; height: 180px;
      border-radius: 50%;
      object-fit: cover;
      object-position: top center;
      border: 5px solid var(--soft-purple);
      box-shadow: 0 0 0 8px rgba(184,150,214,0.2), 0 16px 48px rgba(154,114,196,0.35);
      transition: border-color 0.5s, box-shadow 0.5s;
    }
    [data-theme="dark"] .hero-photo {
      border-color: var(--deep-purple);
      box-shadow: 0 0 0 8px rgba(100,80,180,0.25), 0 16px 60px rgba(180,140,255,0.4);
    }
    @keyframes bunnybounce {
      0%,100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-14px) scale(1.03); }
    }

    .hero-tag {
      font-size: 0.8rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--muted); background: rgba(201,168,224,0.25);
      padding: 6px 18px; border-radius: 100px; margin-bottom: 20px;
      animation: fadeSlideUp 0.8s ease both;
    }
    [data-theme="dark"] .hero-tag { background: rgba(80,60,130,0.35); }

    .hero-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3.2rem, 8vw, 6.5rem);
      line-height: 1.05; color: var(--deep-purple);
      animation: fadeSlideUp 0.9s 0.1s ease both;
    }
    .hero-name span { font-style: italic; color: var(--soft-purple); }

    .hero-sub {
      font-size: clamp(1rem, 2vw, 1.2rem); color: var(--muted);
      margin-top: 16px; max-width: 520px; line-height: 1.7;
      animation: fadeSlideUp 1s 0.2s ease both;
    }
    .hero-quote {
      margin-top: 28px;
      font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.3rem;
      color: var(--deep-purple);
      background: rgba(201,168,224,0.18);
      border-left: 4px solid var(--soft-purple);
      padding: 14px 24px; border-radius: 0 16px 16px 0;
      animation: fadeSlideUp 1.1s 0.3s ease both;
    }
    [data-theme="dark"] .hero-quote { background: rgba(80,60,130,0.25); }

    .hero-btns {
      margin-top: 36px; display: flex; gap: 16px; flex-wrap: wrap;
      justify-content: center; animation: fadeSlideUp 1.2s 0.4s ease both;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--soft-purple), var(--deep-purple));
      color: #fff; border: none; padding: 14px 36px; border-radius: 100px;
      font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 0.95rem;
      cursor: pointer; text-decoration: none;
      box-shadow: 0 8px 28px rgba(139,114,190,0.4);
      transition: transform 0.25s, box-shadow 0.25s;
    }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 14px 36px rgba(139,114,190,0.55); }
    .btn-ghost {
      background: transparent; color: var(--deep-purple);
      border: 2px solid var(--soft-purple); padding: 13px 34px; border-radius: 100px;
      font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 0.95rem;
      cursor: pointer; text-decoration: none;
      transition: background 0.25s, transform 0.25s;
    }
    .btn-ghost:hover { background: rgba(184,150,214,0.15); transform: translateY(-3px); }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .scroll-hint {
      position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      color: var(--muted); font-size: 0.75rem;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 0.5; transform: translateX(-50%) translateY(0); }
      50%      { opacity: 1;   transform: translateX(-50%) translateY(6px); }
    }

    /* ── SECTIONS ── */
    section { position: relative; z-index: 1; padding: 100px 24px; transition: background 0.5s; }
    .section-inner { max-width: 960px; margin: 0 auto; }
    .section-label { font-size: 0.78rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
    .section-title { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 4vw, 3rem); color: var(--deep-purple); margin-bottom: 48px; line-height: 1.2; }

    /* ── ABOUT ── */
    #about { background: var(--bg2); }
    .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 56px; align-items: center; }
    .about-card {
      background: var(--card-bg); border-radius: 28px; padding: 40px;
      box-shadow: 0 12px 48px rgba(139,114,190,0.1); position: relative; overflow: hidden;
      transition: background 0.5s;
    }
    [data-theme="dark"] .about-card { box-shadow: 0 12px 48px rgba(0,0,0,0.4); }
    .about-card::before {
      content: ''; position: absolute; top: -30px; right: -30px;
      width: 120px; height: 120px; border-radius: 50%;
      background: rgba(201,168,224,0.18);
    }
    .about-card p { line-height: 1.9; color: var(--text); font-size: 1.02rem; margin-bottom: 16px; }
    .about-stat { display: flex; flex-direction: column; gap: 20px; }
    .stat-pill {
      background: var(--stat-bg); border-radius: 20px; padding: 24px 28px;
      border: 1px solid var(--stat-border); transition: transform 0.3s, background 0.5s;
    }
    .stat-pill:hover { transform: translateX(8px); }
    .stat-number { font-family: 'Playfair Display', serif; font-size: 2.8rem; color: var(--deep-purple); line-height: 1; }
    .stat-label { font-size: 0.85rem; color: var(--muted); margin-top: 4px; }

    /* ── ACTIVE ── */
    #active { background: var(--bg); }
    .active-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 24px; }
    .active-card {
      background: var(--card-bg); border-radius: 24px; padding: 36px 28px; text-align: center;
      box-shadow: 0 8px 32px rgba(139,114,190,0.08);
      border: 1px solid var(--stat-border);
      transition: transform 0.3s, box-shadow 0.3s, background 0.5s;
    }
    [data-theme="dark"] .active-card { box-shadow: 0 8px 32px rgba(0,0,0,0.35); }
    .active-card:hover { transform: translateY(-10px); box-shadow: 0 20px 48px rgba(139,114,190,0.22); }
    .active-icon { font-size: 2.8rem; margin-bottom: 14px; }
    .active-title { font-weight: 700; color: var(--deep-purple); font-size: 1.05rem; margin-bottom: 8px; }
    .active-desc { font-size: 0.88rem; color: var(--muted); line-height: 1.6; }

    /* ── INTERESTS ── */
    #interests { background: var(--bg2); }
    .interest-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 24px; }
    .interest-card {
      background: var(--card-bg); border-radius: 24px; padding: 36px 28px; text-align: center;
      box-shadow: 0 8px 32px rgba(139,114,190,0.08);
      border: 1px solid var(--stat-border);
      transition: transform 0.3s, box-shadow 0.3s, background 0.5s;
    }
    [data-theme="dark"] .interest-card { box-shadow: 0 8px 32px rgba(0,0,0,0.35); }
    .interest-card:hover { transform: translateY(-10px); box-shadow: 0 20px 48px rgba(139,114,190,0.22); }
    .interest-icon { font-size: 2.8rem; margin-bottom: 14px; }
    .interest-title { font-weight: 700; color: var(--deep-purple); font-size: 1.05rem; margin-bottom: 8px; }
    .interest-desc { font-size: 0.88rem; color: var(--muted); line-height: 1.6; }

    /* ── SKILLS ── */
    #skills { background: var(--bg2); }
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 36px 20px;
      text-align: center;
    }
    .skill-ring {
      position: relative;
      width: 140px;
      height: 140px;
      margin: 0 auto 14px;
    }
    .skill-ring svg { transform: rotate(-90deg); width: 100%; height: 100%; }
    .skill-ring circle {
      fill: none;
      stroke-width: 10;
    }
    .skill-ring .ring-track { stroke: var(--skill-track); }
    .skill-ring .ring-fill {
      stroke: url(#ringGradient);
      stroke-linecap: round;
      stroke-dasharray: 377;
      stroke-dashoffset: 377;
      transition: stroke-dashoffset 1.6s cubic-bezier(0.4,0,0.2,1);
    }
    .skill-ring .ring-percent {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--deep-purple);
    }
    .skill-name {
      font-weight: 600;
      color: var(--text);
      font-size: 0.95rem;
    }

    /* ── VISION ── */
    #vision {
      position: relative;
      background: var(--bg2);
      text-align: center;
      overflow: hidden;
    }
    #vision::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 20% 20%, rgba(184,150,214,0.18), transparent 55%),
                  radial-gradient(circle at 85% 75%, rgba(240,200,120,0.18), transparent 50%),
                  radial-gradient(circle at 70% 15%, rgba(184,150,214,0.14), transparent 45%);
      pointer-events: none;
    }
    .vision-decor { position: absolute; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    #vision .section-inner { position: relative; z-index: 1; }
    #vision .section-title {
      font-family: 'Dancing Script', cursive;
      font-weight: 700;
      color: var(--deep-purple);
      font-size: clamp(2.6rem, 5.5vw, 4rem);
      margin-bottom: 8px;
    }
    #vision .section-label {
      font-family: 'Dancing Script', cursive;
      font-weight: 500;
      font-size: 1.4rem;
      letter-spacing: 0.02em;
      text-transform: none;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .vision-text { max-width: 700px; margin: 0 auto 48px; font-size: 1.1rem; line-height: 1.9; color: var(--text); }
    .money-badge {
      display: inline-block;
      max-width: 600px;
      background: var(--card-bg); border: 2px solid var(--stat-border);
      color: var(--deep-purple); font-family: 'Playfair Display', serif; font-size: 1.25rem; line-height: 1.5;
      padding: 22px 40px; border-radius: 32px; letter-spacing: 0.02em;
      box-shadow: 0 12px 40px var(--card-shadow, rgba(154,114,196,0.15));
      animation: shimmer 3s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%,100% { box-shadow: 0 0 0 0 rgba(184,150,214,0.15); }
      50%      { box-shadow: 0 0 36px 8px rgba(184,150,214,0.35); }
    }

    /* ── BUNNY DIVIDER ── */
    .bunny-divider {
      text-align: center; font-size: 1.5rem; padding: 20px;
      letter-spacing: 0.5rem; color: var(--soft-purple);
      animation: hop 2s ease-in-out infinite;
      background: var(--bg); transition: background 0.5s;
    }
    #about + .bunny-divider { background: var(--bg2); }
    #interests + .bunny-divider { background: var(--bg); }
    #skills + .bunny-divider { background: var(--bg2); }
    @keyframes hop {
      0%,100% { letter-spacing: 0.4rem; }
      50%      { letter-spacing: 0.8rem; }
    }

    /* ── FOOTER ── */
    footer {
      background: var(--deep-purple); color: rgba(255,255,255,0.8);
      text-align: center; padding: 56px 24px;
      transition: background 0.5s;
    }
    [data-theme="dark"] footer { background: #0d0a1a; }
    .footer-photo {
      width: 72px; height: 72px; border-radius: 50%;
      object-fit: cover; object-position: top center;
      border: 3px solid rgba(255,255,255,0.4);
      animation: bunnybounce 2.4s ease-in-out infinite;
      margin-bottom: 12px;
    }
    footer h3 { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: #fff; margin-bottom: 8px; }
    footer p { font-size: 0.9rem; line-height: 1.8; opacity: 0.7; }
    .footer-heart { color: #f0a0c0; }

    /* ── REVEAL ── */
    .reveal { opacity: 0; transform: translateY(40px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ── CURSOR ── */
    #cursor-star {
      position: fixed; pointer-events: none; font-size: 1.2rem;
      z-index: 9999; transition: transform 0.1s ease;
      transform: translate(-50%, -50%);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      nav { padding: 14px 20px; }
      .nav-links { display: none; }
      .about-grid, .skills-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Custom cursor -->
<div id="cursor-star">✦</div>

<!-- Floating particles -->
<div id="particles"></div>

<!-- Theme Toggle -->
<button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
  <span id="theme-icon">🌙</span>
  <div class="toggle-track"><div class="toggle-thumb"></div></div>
  <span id="theme-label">Dark</span>
</button>

<!-- ── NAV ── -->
<nav>
  <div class="nav-logo">
    
    Prathiksha
  </div>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#active">Active</a></li>
    <li><a href="#interests">Interests</a></li>
    <li><a href="#skills">Skills</a></li>
    <li><a href="#vision">Vision</a></li>
  </ul>
</nav>

<!-- ── HERO ── -->
<section id="hero">
  <div class="tulip-bg" id="tulipBg"></div>
